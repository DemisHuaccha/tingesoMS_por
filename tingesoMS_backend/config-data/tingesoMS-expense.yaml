server:
  # Puerto estándar para el contenedor en el clúster
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: tingesoMS-expense
  datasource:
    # Conexión a la base de datos de egresos
    url: jdbc:mysql://${MYSQL_HOST:mysql-service}:3306/expense_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    # Credenciales inyectadas desde el Secret de K8s
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always