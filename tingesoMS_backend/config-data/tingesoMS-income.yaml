server:
  # Puerto estandarizado para la comunicación interna en el clúster
  port: ${SERVER_PORT:8080}

spring:
  application:
    # CORRECCIÓN: Identidad propia para el microservicio de ingresos
    name: tingesoMS-income
  datasource:
    # CORRECCIÓN: Apuntar a income_db en lugar de report_db
    url: jdbc:mysql://${MYSQL_HOST:mysql-service}:3306/income_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    # Credenciales inyectadas desde el Secret de K8s (vía Deployment)
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# NOTA: Los bloques 'income-service' y 'expense-service' se eliminan aquí
# porque solo el microservicio de REPORT los necesita para consultar a los demás.

# Heurística 1: Visibilidad del estado del sistema
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always