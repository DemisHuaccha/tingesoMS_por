spring:
  application:
    name: tingesoMS-expense
  cloud:
    config:
      # Cambiamos localhost por el nombre del Service de K8s: config-service
      uri: http://${CONFIG_SERVER_HOST:config-service}:8888
      # Heurística 5: Prevención de errores. Si el config no carga, el microservicio no arranca
      fail-fast: true
      retry:
        # Heurística 9: Ayudar a recuperarse de errores (reintentos de conexión)
        initial-interval: 3000
        max-attempts: 6