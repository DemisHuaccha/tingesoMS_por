apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-script
data:
  init.sh: |
    #!/bin/bash
    set -e
    mysql -u root -p"$MYSQL_ROOT_PASSWORD" <<-EOSQL
        -- 1. Microservicio Income
        CREATE DATABASE IF NOT EXISTS income_db;
        CREATE USER IF NOT EXISTS '$USER_INCOME'@'%' IDENTIFIED BY '$PASS_INCOME';
        GRANT ALL PRIVILEGES ON income_db.* TO '$USER_INCOME'@'%';

        -- 2. Microservicio Expense
        CREATE DATABASE IF NOT EXISTS expense_db;
        CREATE USER IF NOT EXISTS '$USER_EXPENSE'@'%' IDENTIFIED BY '$PASS_EXPENSE';
        GRANT ALL PRIVILEGES ON expense_db.* TO '$USER_EXPENSE'@'%';

        -- 3. Microservicio Report
        CREATE DATABASE IF NOT EXISTS report_db;
        CREATE USER IF NOT EXISTS '$USER_REPORT'@'%' IDENTIFIED BY '$PASS_REPORT';
        GRANT ALL PRIVILEGES ON report_db.* TO '$USER_REPORT'@'%';

        -- 4. Microservicio Auth (Keycloak/Custom)
        CREATE DATABASE IF NOT EXISTS auth_db;
        CREATE USER IF NOT EXISTS '$USER_AUTH'@'%' IDENTIFIED BY '$PASS_AUTH';
        GRANT ALL PRIVILEGES ON auth_db.* TO '$USER_AUTH'@'%';

        FLUSH PRIVILEGES;
    EOSQL